name: Daily activity commit

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Write daily log
        run: echo "Activity log $(date '+%Y-%m-%d %H:%M:%S')" >> activity.log

      - name: Commit and push
        run: |
          git config user.name "gkmbala"
          git config user.email "gkmbala@users.noreply.github.com"
          git add activity.log
          if git diff --staged --quiet; then
            echo "Nothing to commit, skipping"
          else
            git commit -m "chore: daily log $(date '+%Y-%m-%d')"
            git push origin main
          fi
