name: Daily activity commit

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Write daily log
        run: echo "Activity log $(date '+%Y-%m-%d %H:%M:%S')" >> activity.log

      - name: Commit and push
        run: |
          git config user.name "gkmbala"
          git config user.email "your-email@example.com"
          git add activity.log
          if git diff --staged --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "chore: daily log $(date '+%Y-%m-%d')"
            git push
          fi
