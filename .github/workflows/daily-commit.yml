name: Daily activity commit

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Commit daily log
        run: |
          git config user.name "gkmbala"
          git config user.email "gkmbala@gmail.com"
          echo "Activity log: $(date '+%Y-%m-%d %H:%M:%S')" >> activity.log
          git add activity.log
          git commit -m "chore: daily activity log $(date '+%Y-%m-%d')"
          git push
